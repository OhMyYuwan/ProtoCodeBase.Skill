- rule_id: profile.acp_capability_spec.slice_routing_semantics
  source_anchor: acp_capability_spec::slice_structure
  source_document_id: acp_capability_spec
  source_role: normative-rule
  conditions: [capability-enabled]
  statement_markdown: |2-

    Slices MAY define `route_here_when` and `bridge_when` fields as optional
    routing guidance for agents and maintainers.

    `route_here_when` describes when agent work should be routed to this slice.
    `bridge_when` describes when work in this slice needs to cross into another
    capability or slice.

    `bridge_when` MUST NOT be treated as automatic authorization to expand scope.
    It is a signal to surface the conflict and seek user confirmation before
    widening the Request.

- rule_id: profile.acp_kernel_spec.intent_authorization_boundary
  source_anchor: acp_kernel_spec::intent_authorization_boundary
  source_document_id: acp_kernel_spec
  source_role: guard-boundary
  conditions: []
  statement_markdown: |2-

    A recorded intention is NOT execution authorization.

    An Intent object MUST NOT be treated as a substitute for a Request.
    Pending requirements, historical plans, and wish lists outside the Kernel
    MUST NOT be treated as authorization to modify code.

    An agent MUST NOT begin plan generation or code modification on the basis
    of a recorded intention alone, regardless of how detailed it appears.

    Active execution authority begins at Request formation and confirmation,
    not at intention recording.

- rule_id: profile.acp_operation_model.work_intake
  source_anchor: acp_operation_model::work_intake
  source_document_id: acp_operation_model
  source_role: runtime-rule
  conditions: [capability-enabled]
  statement_markdown: |2-

    For mutation operations (modify, repair, create), agents SHOULD perform
    a work intake step before forming a Request when capability and support
    layers are enabled.

    Work intake classifies: capability, slice, authority boundary, bridge
    conditions, and first-contact files.

    Work intake results are NOT authorization. A pending requirement identified
    during intake MUST NOT be treated as a Request.

    If a bridge condition is identified, the agent SHOULD surface it and confirm
    with the user before forming the Request.

- rule_id: profile.acp_init_spec.historical_document_guard
  source_anchor: acp_init_spec::historical_document_guard
  source_document_id: acp_init_spec
  source_role: guard-boundary
  conditions: []
  statement_markdown: |2-

    Historical planning documents, architecture notes, and backlog items that
    predate ACP initialization are routing aids only. They are NOT execution
    authorization and MUST NOT be converted into Requests without explicit user
    confirmation of scope.

    Prior planning documents MUST NOT be converted into ACP Request, Plan, or
    Change objects. New Kernel lineage begins from the first Request opened
    after migration initialization.

- rule_id: profile.acp_support_layer_spec.agent_md_quick_entry_block
  source_anchor: acp_support_layer_spec::agent_md_quick_entry_block
  source_document_id: acp_support_layer_spec
  source_role: normative-rule
  conditions:
  - support-enabled
  statement_markdown: |2-

    AGENT.md MAY include a `quick_entry` block at the top of the file as a
    structured, machine-readable bootstrap accelerator.

    When present, agents SHOULD read the `quick_entry` block first and MAY
    defer reading the AGENT.md body until user intent is narrower.

    `active_request_id` MUST be surfaced to the user when present in the
    `quick_entry` block, so active work-in-progress is not silently bypassed.

    `quick_entry` MUST NOT contain evolution state beyond the
    `active_request_id` pointer.

    `quick_entry` content MUST remain consistent with the AGENT.md body and
    the project's `.acp/version.yaml`.
